<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ page.title }}</title>
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
    <meta name="author" content="{{ site.author.name }}">
    <!-- Enable responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Custom styles -->
    <link href="{{ ASSET_PATH }}/css/reset.css" rel="stylesheet" type="text/css" >
    <link href="{{ ASSET_PATH }}/css/mobile_layout.css" rel="stylesheet" type="text/css" media="screen and (max-width: 999px)">
    <link href="{{ ASSET_PATH }}/css/desktop_layout.css" rel="stylesheet" type="text/css" media="screen and (min-width: 1000px)">
    <!--0 HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
    <script src="https://oss.maxcdn.com/libs/respond.js/1.3.0/respond.min.js"></script>
    <![endif]-->
    <!-- atom & rss feed -->
    <link href="{{ BASE_PATH }}{{ site.JB.atom_path }}" type="application/atom+xml" rel="alternate" title="Sitewide ATOM Feed">
    <link href="{{ BASE_PATH }}{{ site.JB.rss_path }}" type="application/rss+xml" rel="alternate" title="Sitewide RSS Feed">
    <link href="{{ ASSET_PATH }}/css/mini_animate.css" rel="stylesheet" />
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
  </head>
  <body>
    <!--navbar-->
    <div class="nav-wrapper style-shadow">
      <div class="nav-header">
        <div class="me">
          <div class="me-author">JAJA</div>
          <div class="me-shadow"></div>
          <a href="{{ HOME_PATH }}"><img src="{{ ASSET_PATH }}/images/me.png" /></a>
        </div>
      </div>
      <nav class="navgation">
        <ul>
          <li class="archive"><i class="fa fa-clock-o fa-lg"></i><a href="/archive.html">RecenPost</a></li>
          <li class="categories"><i class="fa fa-th-large fa-lg"></i><a href="/categories.html">Category</a></li>
          <li class="tags"><i class="fa fa-tags fa-lg"></i><a href="/tags.html">Tags</a></li>
          <li class="about"><i class="fa fa-coffee fa-lg"></i><a href="/about.html">AboutMe</a></li>
        </ul>
      </nav>
      <input type="text" class="search-Bar">
      <div class="share-icons"></div>
    </div>
    <div class="clip">
    </div>
    <header class="style-shadow">
      <div class="header-wrapper">
        <div class="logo">
          <h1>
          Just A Reminder
          </h1>
        </div>
        <div class="title">
          <h1><a href="{{ HOME_PATH }}">REMINDER</a></h1>
        </div>
      </div>
      <!--navbar show/hide button-->
      <div class="nav-btn style-shadow">
        <div class="line"></div>
      </div>
      <!--layout list/box button-->
      <div class="config-wrapper">
        <div class="layout-list">
          <div class="list-point"></div>
        </div>
        <div class="layout-box">
          <div class="list-box"></div>
        </div>
      </div>
    </header>
    <!-- article content -->
    <div class="content-wrapper">
      {{ content }}
    </div>
    
    <footer>
      <div class="copyright">
        Copyright 2014 | All Rights Reserved. Designed by Jaja
      </div>
    </footer>
    
    <script src="{{ ASSET_PATH }}/js/bower_components/jquery/dist/jquery.min.js"></script>
    <script src="{{ ASSET_PATH }}/js/mainScript.js"></script>
  </body>
</html>
